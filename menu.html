<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنيو - بوبا كافيه</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header & Navigation -->
    <header>
        <nav class="container">
            <a href="index.html" class="logo">بوبا <span>كافيه.</span></a>
            
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="menu.html" style="color: var(--primary-color);">المنيو</a></li>
                <li><a href="index.html#about">من نحن</a></li>
            </ul>

            <div class="nav-icons">
                <button class="icon-btn" id="theme-toggle" aria-label="تبديل المظهر">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <a href="cart.html" class="icon-btn" aria-label="السلة">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-count" id="cart-badge">0</span>
                </a>
                <button class="icon-btn mobile-menu-btn" id="mobile-menu-btn" aria-label="القائمة">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </nav>
    </header>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Menu Header & Controls -->
    <section class="page-header fade-in">
        <div class="container">
            <h2>قائمة المشروبات والحلويات</h2>
            <div class="menu-controls">
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="search-input" placeholder="ابحث عن مشروبك المفضل...">
                </div>
                <div class="filter-btns" id="filter-container">
                    <button class="filter-btn active" data-filter="all">الكل</button>
                    <button class="filter-btn" data-filter="mojito">موهيتو</button>
                    <button class="filter-btn" data-filter="smoothie">سموثي</button>
                    <button class="filter-btn" data-filter="icetea">آيس تي</button>
                    <button class="filter-btn" data-filter="bobamix">بوبا ميكس</button>
                    <button class="filter-btn" data-filter="milkshake">ميلك شيك</button>
                    <button class="filter-btn" data-filter="icecoffee">آيس كوفي</button>
                    <button class="filter-btn" data-filter="frappe">فرابيه</button>
                    <button class="filter-btn" data-filter="matcha">ماتشا</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Menu Grid -->
    <section class="section" style="padding-top: 0;">
        <div class="container">
            <div class="featured-grid" id="menu-container">
                <!-- يتم تحميل المنتجات هنا عبر الجافاسكريبت -->
                <p style="text-align: center; grid-column: 1/-1;">جاري تحميل المنيو...</p>
            </div>
        </div>
    </section>

    <!-- QR Code Section -->
    <section class="section" id="qr-section" style="background-color: var(--card-bg); text-align: center; margin-bottom: 3rem; border-radius: 20px; box-shadow: var(--shadow);">
        <div class="container">
            <h2 style="margin-bottom: 1rem;">شارك المنيو بسهولة</h2>
            <p style="color: var(--text-light); margin-bottom: 2rem; font-size: 1.1rem;">امسح الرمز السريع (QR Code) لمشاركة منيو كافيه بوبا مع أصدقائك.</p>
            <div style="background: white; display: inline-block; padding: 1.5rem; border-radius: 20px; box-shadow: var(--shadow-hover);">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://boubacafe.com/menu" alt="QR Code" style="width: 200px; height: 200px;">
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container footer-bottom" style="padding-top: 0; border-top: none;">
            <p>&copy; 2026 بوبا كافيه. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
