<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسح الـ QR - بوبا كافيه</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

    <div class="container fade-in" style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem;">
        <div style="background-color: var(--card-bg); padding: 3rem 2rem; border-radius: 30px; box-shadow: var(--shadow-hover); text-align: center; max-width: 400px; width: 100%; border: 1px solid var(--border-color);">
            <h1 class="logo" style="margin-bottom: 1rem; color: var(--text-color);">بوبا <span style="color: var(--primary-color);">كافيه.</span></h1>
            <p style="color: var(--text-light); margin-bottom: 2rem; font-size: 1.1rem;">امسح الكود لتصفح المنيو الخاص بنا</p>
            
            <div style="background: white; padding: 1rem; border-radius: 20px; display: inline-block; margin-bottom: 2rem; box-shadow: var(--shadow);">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://boubacafe.demo/menu.html" alt="QR Code للمنيو" style="width: 250px; height: 250px;">
            </div>
            
            <a href="menu.html" class="btn btn-primary" style="width: 100%; margin-bottom: 1.5rem;">عرض المنيو مباشرة</a>
            
            <button class="icon-btn" id="theme-toggle" aria-label="تبديل المظهر">
                <i class="fa-solid fa-moon" style="font-size: 1.5rem;"></i>
            </button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
