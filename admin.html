<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لوحة الإدارة</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body.dark-theme {
            --glass-bg: rgba(30, 30, 30, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 154, 158, 0.15) 0, transparent 50%), 
                radial-gradient(at 50% 0%, rgba(254, 207, 239, 0.15) 0, transparent 50%), 
                radial-gradient(at 100% 0%, rgba(250, 204, 21, 0.1) 0, transparent 50%);
            position: relative;
            overflow: hidden;
        }

        .login-page::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary-gradient);
            filter: blur(100px);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            opacity: 0.3;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem 2.5rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid var(--glass-border);
            z-index: 1;
            transition: var(--transition);
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.15);
        }

        .login-card h2 {
            margin-bottom: 2rem;
            color: var(--text-color);
            font-size: 1.8rem;
            font-weight: 800;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 700;
            color: var(--text-color);
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 1px solid var(--border-color);
            border-radius: 15px;
            font-family: inherit;
            font-size: 1rem;
            background-color: rgba(255, 255, 255, 0.5);
            color: var(--text-color);
            transition: var(--transition);
        }

        body.dark-theme .form-control {
            background-color: rgba(0, 0, 0, 0.2);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(255, 154, 158, 0.2);
            background-color: var(--bg-color);
        }

        .error-msg {
            color: #EF4444;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            font-weight: bold;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            padding: 0.8rem;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 15px;
            background: var(--primary-gradient);
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 15px -3px rgba(255, 154, 158, 0.4);
            margin-top: 1rem;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(255, 154, 158, 0.5);
        }

        .login-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="login-page">
        <div class="login-card fade-in">
            <h2>تسجيل دخول الإدارة</h2>
            <div id="login-error" class="error-msg">بيانات غير صحيحة</div>
            <form id="login-form">
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="username" class="form-control" required placeholder="مثال: admin">
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" class="form-control" required placeholder="مثال: admin">
                </div>
                <button type="submit" class="login-btn">تسجيل الدخول</button>
            </form>
            <div style="margin-top: 1.5rem;">
                <button class="icon-btn" id="theme-toggle" aria-label="تبديل المظهر">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <a href="index.html" style="display: block; margin-top: 1rem; color: var(--text-light); text-decoration: underline;">العودة للموقع</a>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <!-- Login Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('login-form');
            if (loginForm) {
                loginForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const user = document.getElementById('username').value;
                    const pass = document.getElementById('password').value;

                    if (user === 'admin' && pass === 'admin') {
                        sessionStorage.setItem('bouba_admin_logged_in', 'true');
                        window.location.href = 'dashboard.html';
                    } else {
                        const errorMsg = document.getElementById('login-error');
                        if (errorMsg) errorMsg.style.display = 'block';
                    }
                });
            }

            // If already logged in, redirect
            if (sessionStorage.getItem('bouba_admin_logged_in') === 'true') {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
