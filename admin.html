<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لوحة الإدارة</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-color), var(--border-color));
        }
        .login-card {
            background-color: var(--card-bg);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: var(--shadow-hover);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .login-card h2 {
            margin-bottom: 2rem;
            color: var(--text-color);
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: right;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: var(--transition);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.2);
        }
        .error-msg {
            color: #EF4444;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            font-weight: bold;
            display: none;
            background: #FEE2E2;
            padding: 0.5rem;
            border-radius: 5px;
        }
        body.dark-theme .error-msg {
            background: rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>

    <div class="login-page">
        <div class="login-card fade-in">
            <h2>تسجيل دخول الإدارة</h2>
            <div id="login-error" class="error-msg">بيانات غير صحيحة</div>
            <form id="login-form">
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="username" class="form-control" required placeholder="مثال: admin">
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" class="form-control" required placeholder="مثال: admin">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">تسجيل الدخول</button>
            </form>
            <div style="margin-top: 1.5rem;">
                <button class="icon-btn" id="theme-toggle" aria-label="تبديل المظهر">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <a href="index.html" style="display: block; margin-top: 1rem; color: var(--text-light); text-decoration: underline;">العودة للموقع</a>
            </div>
        </div>
    </div>

    <!-- Login Logic -->
    <script>
        // Theme toggle logic just for this page
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        const savedTheme = localStorage.getItem('bouba_theme');
        if (savedTheme === 'dark') {
            body.classList.add('dark-theme');
            themeToggle.querySelector('i').classList.replace('fa-moon', 'fa-sun');
        }
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-theme');
            const isDark = body.classList.contains('dark-theme');
            localStorage.setItem('bouba_theme', isDark ? 'dark' : 'light');
            const icon = themeToggle.querySelector('i');
            if (isDark) {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        });

        // Auth Logic
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'admin' && pass === 'admin') {
                sessionStorage.setItem('bouba_admin_logged_in', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        });

        // If already logged in, redirect
        if (sessionStorage.getItem('bouba_admin_logged_in') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
